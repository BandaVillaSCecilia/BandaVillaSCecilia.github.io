<!-- GLightbox Javascript -->
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Select all links that point to images and add glightbox class
    const imageExtensions = ['.jpg', '.jpeg', '.JPG', '.png', '.gif'];
    document.querySelectorAll("a").forEach(link => {
      const href = link.getAttribute('href');
      if (href) {
        // Clean up query parameters or hashes in comparison
        const cleanHref = href.split('?')[0].split('#')[0];
        if (imageExtensions.some(ext => cleanHref.endsWith(ext))) {
          link.classList.add('glightbox');
        }
      }
    });

    // Initialize GLightbox
    const lightbox = GLightbox({
      selector: '.glightbox',
      loop: true,
      openEffect: 'zoom',
      closeEffect: 'zoom'
    });
  });
</script>
